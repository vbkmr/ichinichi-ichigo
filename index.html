<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <!-- Defense-in-depth: even if the rendered markdown ever carried injected
         markup, this policy stops inline/foreign scripts from running. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none';
               script-src 'self' https://cdn.jsdelivr.net https://www.googletagmanager.com;
               style-src 'self' https://fonts.googleapis.com;
               font-src https://fonts.gstatic.com;
               connect-src 'self' https://*.google-analytics.com https://*.analytics.google.com https://www.googletagmanager.com;
               img-src 'self' data: https://*.google-analytics.com https://*.googletagmanager.com;
               base-uri 'none';
               form-action 'none';"
    />
    <title>🍓 一日一語 — One Japanese word a day</title>
    <meta
      name="description"
      content="一日一語 (ichinichi-ichigo) — learn one Japanese word a day. Tap to reveal the meaning, kanji breakdown, nuance, and example sentences."
    />
    <meta
      name="keywords"
      content="Japanese vocabulary, 日本語, kanji, 一日一語, learn Japanese, word a day, JLPT"
    />
    <meta name="author" content="vbkmr" />
    <meta name="robots" content="index, follow" />
    <!-- browser chrome follows the kon-iro theme: 鉄紺 on dark, 生成り on light -->
    <meta name="theme-color" content="#0b1430" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#efe7d3" media="(prefers-color-scheme: light)" />
    <link rel="canonical" href="https://vbkmr.github.io/ichinichi-ichigo/" />

    <!-- Open Graph (Facebook, Slack, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="一日一語" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:title" content="🍓 一日一語 — One Japanese word a day" />
    <meta
      property="og:description"
      content="Learn one Japanese word a day — meaning, kanji breakdown, nuance, and example sentences."
    />
    <meta property="og:url" content="https://vbkmr.github.io/ichinichi-ichigo/" />
    <meta
      property="og:image"
      content="https://vbkmr.github.io/ichinichi-ichigo/assets/site-open.png"
    />
    <meta property="og:image:alt" content="一日一語 showing a Japanese word with its full breakdown revealed" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="🍓 一日一語 — One Japanese word a day" />
    <meta
      name="twitter:description"
      content="Learn one Japanese word a day — meaning, kanji breakdown, nuance, and example sentences."
    />
    <meta
      name="twitter:image"
      content="https://vbkmr.github.io/ichinichi-ichigo/assets/site-open.png"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Shippori+Mincho:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- kon-iro (紺色) design tokens + light/dark themes; must load before style.css -->
    <link rel="stylesheet" href="kon-iro.css" />
    <link rel="stylesheet" href="style.css" />

    <!-- Google Analytics (GA4). Dormant until a Measurement ID is set in
         analytics.js; kept external so the strict CSP (no 'unsafe-inline') allows it. -->
    <script src="analytics.js"></script>
  </head>
  <body>
    <main class="site">
      <div class="hero">
        <p class="eyebrow">🍓 一日一語 <span class="sep">·</span> 今日の言葉</p>
        <button id="word" class="word" aria-expanded="false" aria-controls="panel"></button>
        <p id="reading" class="reading"></p>
        <p id="hint" class="hint">tap to reveal · double-tap for a new word</p>
        <section id="panel" class="panel hidden" aria-live="polite"></section>
        <p id="meta" class="meta"></p>
      </div>
    </main>
    <!-- Pinned + SRI: the browser refuses these files if their bytes don't
         match the hash, so a tampered CDN response can't execute. -->
    <script
      src="https://cdn.jsdelivr.net/npm/marked@18.0.5/lib/marked.umd.js"
      integrity="sha384-ZD0fTOwPMHi7zM6WTVIWJR21I07lq0ccnqz3J6WMvQKG9thh4y7TA1QE6PJu0Af8"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/dompurify@3.4.11/dist/purify.min.js"
      integrity="sha384-o44XUELLEnv/iSlA1NWxBweqbD4TSR0qgq2VzVsxtkHS989JJjGKSE9vkfo5MN4K"
      crossorigin="anonymous"
    ></script>
    <script src="app.js"></script>
  </body>
</html>
