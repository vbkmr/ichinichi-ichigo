<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>🍓 一日一語</title>
    <meta name="description" content="一日一語 — one Japanese word a day." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Shippori+Mincho:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="site">
      <div class="hero">
        <p class="eyebrow">🍓 一日一語 <span class="sep">·</span> 今日の言葉</p>
        <button id="word" class="word" aria-expanded="false" aria-controls="panel"></button>
        <p id="reading" class="reading"></p>
        <p id="hint" class="hint">tap to reveal · double-tap for a new word</p>
        <section id="panel" class="panel hidden" aria-live="polite"></section>
        <p id="meta" class="meta"></p>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
